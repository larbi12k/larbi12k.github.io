
<!DOCTYPE html>
<html>
<body>

<h2>عداد الكلمات</h2>

<textarea id="txt"></textarea>
<button onclick="count()">احسب</button>

<p id="res"></p>

<script>
function count(){
let text = document.getElementById("txt").value;
let words = text.trim().split(/\s+/).length;
document.getElementById("res").innerText = words + " كلمات";
}
</script>

</body>
</html>
